<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Prueba — Prueba</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
:root {
  --bg: #0f0f0f; --bg2: #181818; --bg3: #222;
  --text: #e8e6e3; --muted: #888; --accent: #ff9064;
  --border: rgba(255,255,255,0.08);
  --radius: 10px;
}
[data-theme="light"] {
  --bg: #fafaf9; --bg2: #f0ede9; --bg3: #e8e4df;
  --text: #1a1a1a; --muted: #666; --accent: #d95f2b;
  --border: rgba(0,0,0,0.1);
}
html { font-size: 15px; scroll-behavior: smooth }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  line-height: 1.7; min-height: 100vh;
}
a { color: var(--accent); text-decoration: none }
a:hover { text-decoration: underline }

/* Layout */
.layout { display: flex; min-height: 100vh }
.sidebar {
  width: 260px; flex-shrink: 0; background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px 16px; position: sticky; top: 0; height: 100vh;
  overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
}
.main { flex: 1; min-width: 0; padding: 48px 56px; max-width: 780px }
@media (max-width: 720px) {
  .layout { flex-direction: column }
  .sidebar { width: 100%; height: auto; position: static }
  .main { padding: 24px 20px }
}

/* Sidebar */
.site-name { font-size: 1rem; font-weight: 700; color: var(--text) }
.site-desc { font-size: 0.8rem; color: var(--muted); margin-top: 2px }
.nav-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
             letter-spacing: .08em; color: var(--muted); margin-top: 8px }
.nav-list { list-style: none; display: flex; flex-direction: column; gap: 2px }
.nav-list a {
  display: block; padding: 6px 10px; border-radius: 6px;
  color: var(--muted); font-size: 0.85rem; transition: all .15s;
}
.nav-list a:hover, .nav-list a.active {
  background: var(--bg3); color: var(--text); text-decoration: none;
}
.theme-btn {
  margin-top: auto; padding: 6px 12px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--muted); font-size: 0.8rem; cursor: pointer;
  transition: color .15s;
}
.theme-btn:hover { color: var(--text) }

/* Content */
.note-title {
  font-size: 2rem; font-weight: 700; line-height: 1.2;
  color: var(--text); margin-bottom: 0.5rem;
}
.note-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; display: flex; gap: 12px; flex-wrap: wrap }
.tag {
  background: var(--bg3); color: var(--muted);
  padding: 2px 8px; border-radius: 20px; font-size: 0.75rem;
}
.prose { color: var(--text) }
.prose h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 .5em }
.prose h2 { font-size: 1.35rem; font-weight: 600; margin: 1.6em 0 .4em; padding-bottom: .3em; border-bottom: 1px solid var(--border) }
.prose h3 { font-size: 1.1rem; font-weight: 600; margin: 1.2em 0 .4em }
.prose p { margin: 0 0 .85em }
.prose ul, .prose ol { padding-left: 1.5em; margin: .5em 0 }
.prose li { margin: .2em 0 }
.prose blockquote { border-left: 3px solid var(--accent); margin: 1em 0; padding: 4px 0 4px 16px; color: var(--muted) }
.prose code { font-family: 'Cascadia Code','Fira Code',monospace; font-size: .84em; background: var(--bg3); padding: 2px 5px; border-radius: 4px }
.prose pre { background: #1e1e2e; border-radius: 8px; padding: 16px 20px; margin: 1em 0; overflow-x: auto }
.prose pre code { background: none; color: #cdd6f4; padding: 0; font-size: .82rem }
.prose table { border-collapse: collapse; width: 100%; margin: 1em 0 }
.prose th, .prose td { border: 1px solid var(--border); padding: .5em .75em; font-size: .9em }
.prose th { background: var(--bg2) }
.prose a { color: var(--accent) }
.prose img { max-width: 100%; border-radius: 6px; margin: .5em 0 }
.prose hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0 }

/* Index cards */
.index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 24px }
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: border-color .2s, transform .2s;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px) }
.card-title { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 6px }
.card-excerpt { font-size: .82rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap }
</style>
  <script>
(function(){
  var t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  window.__toggleTheme = function(){
    var n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('theme', n);
    document.querySelectorAll('.theme-btn').forEach(function(b){ b.textContent = n === 'dark' ? 'Light mode' : 'Dark mode' });
  }
})();
</script>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div>
      <div class="site-name">Prueba</div>
      <div class="site-desc">Notes &amp; ideas</div>
    </div>
    <div>
      <div class="nav-title">Notes</div>
      <ul class="nav-list"><li><a href="prueba-2.html">prueba 2</a></li></ul>
    </div>
    <button class="theme-btn" onclick="__toggleTheme()">Light mode</button>
  </nav>
  <main class="main">
    <h1 class="note-title">Prueba</h1>
    <p style="color:var(--muted);margin-top:.5rem">Notes &amp; ideas</p>
    <div class="index-grid">
    <a class="card" href="notes/prueba-2.html">
      <div class="card-title">prueba 2</div>
      <div class="card-excerpt">&lt;p&gt;--- publish: true ---&lt;/p&gt;&lt;h2&gt;hola esto es una prueba&lt;/h2&gt;&lt;p&gt;&lt;/p&gt;&lt;p&gt;&lt;/p&gt;&lt;p&gt;&lt;/p&gt;&lt;p&gt;&lt;/p&gt;&lt;p&gt;&lt;/p&gt;…</div>
      <div class="card-tags"></div>
    </a></div></main>
</div>
</body>
</html>
